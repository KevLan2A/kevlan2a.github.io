<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — Olivier Louette, artisan menuisier</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f7f1e5;--pine:#e9d7b6;--caramel:#b07f45;--caramel-deep:#8a5f2e;
  --ink:#33251a;--ink-soft:#5d4a3a;--muted:#8a7663;--pencil:#a89478;
  --ease:cubic-bezier(.22,.8,.24,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100svh;display:grid;place-items:center;
  background:var(--paper);
  background-image:radial-gradient(rgba(141,110,99,.045) 1px, transparent 1px),radial-gradient(rgba(176,127,69,.035) 1px, transparent 1px);
  background-size:26px 26px,34px 34px;background-position:0 0,13px 17px;
  color:var(--ink);font-family:"Figtree",system-ui,sans-serif;line-height:1.65;
  -webkit-font-smoothing:antialiased;text-align:center;padding:30px 18px;
}
main{max-width:640px}
.logo{height:70px;margin:0 auto 26px;opacity:0;animation:fadeUp .8s var(--ease) .1s forwards}
.gros-nombre{
  font-family:"Fraunces",serif;font-weight:700;font-size:clamp(6rem,22vw,11rem);line-height:.95;
  color:transparent;-webkit-text-stroke:2.5px var(--pencil);position:relative;
  opacity:0;animation:fadeUp .8s var(--ease) .2s forwards;
}
.gros-nombre em{
  font-style:normal;color:var(--caramel);-webkit-text-stroke:0;
  display:inline-block;animation:balance 3.4s ease-in-out infinite;
  transform-origin:top center;
}
@keyframes balance{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(1.5rem,4.5vw,2.2rem);margin:22px 0 12px;opacity:0;animation:fadeUp .8s var(--ease) .35s forwards}
p{color:var(--ink-soft);max-width:46ch;margin:0 auto 8px;opacity:0;animation:fadeUp .8s var(--ease) .5s forwards}
p.note{font-style:italic;color:var(--muted);font-size:.95rem}
.trace{width:min(320px,70%);margin:26px auto 30px;opacity:0;animation:fadeUp .8s var(--ease) .6s forwards}
.trace path{stroke:var(--pencil);stroke-width:1.6;fill:none;stroke-linecap:round;stroke-dasharray:5 6}
.trace text{font-family:"Fraunces",serif;font-style:italic;fill:var(--pencil);font-size:13px}
.actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;opacity:0;animation:fadeUp .8s var(--ease) .7s forwards}
.btn{
  display:inline-flex;align-items:center;gap:10px;padding:14px 26px;border-radius:12px;
  font-weight:600;font-size:.98rem;text-decoration:none;transition:transform .3s var(--ease), background .3s;
}
.btn-primary{background:#33251a;color:#f7f1e5;box-shadow:0 6px 18px rgba(51,37,26,.22)}
.btn-primary:hover{background:var(--caramel-deep);transform:translateY(-3px)}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--pencil)}
.btn-ghost:hover{border-color:var(--ink);transform:translateY(-3px)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;animation-delay:0s!important}
  .logo,.gros-nombre,h1,p,.trace,.actions{opacity:1}
  .gros-nombre em{animation:none}
}
</style>
</head>
<body>
<main>
  <img class="logo" src="/logo.png" alt="Logo Olivier Louette">
  <div class="gros-nombre">4<em>0</em>4</div>
  <h1>Cette page a fini en copeaux.</h1>
  <p>La planche que vous cherchez n'est pas dans l'atelier — elle a peut-être été déplacée, rabotée, ou n'a jamais été débitée.</p>
  <p class="note">« Mesurer deux fois, cliquer une fois. » — proverbe de menuisier</p>
  <svg class="trace" viewBox="0 0 320 60" aria-hidden="true">
    <path d="M10 40 Q 80 15 160 35 T 310 30"/>
    <text x="228" y="18">retour à l'établi →</text>
  </svg>
  <div class="actions">
    <a class="btn btn-primary" href="/">Retour à l'accueil</a>
    <a class="btn btn-ghost" href="/realisations.html">Voir les réalisations</a>
  </div>
</main>
<script data-goatcounter="https://olivierlouette.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
